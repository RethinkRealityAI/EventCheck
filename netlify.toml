[build]
  command = "npm run build"
  publish = "dist"

# Handle Single Page Application Routing
# This ensures that when a user refreshes /admin or /register, 
# Netlify serves index.html instead of showing a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Remove X-Frame-Options DENY to allow embedding
    # Use CSP frame-ancestors instead for modern control
    Content-Security-Policy = "frame-ancestors *;"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Explicitly grant payment + WebAuthn capabilities to any embedding origin.
    # Chrome and Safari strip these features by default on cross-origin iframes,
    # which would break PayPal Checkout / Flutterwave checkout (incl. Apple/Google
    # Pay) + any future passkey signup inside the GANSID Congress embed on
    # inheritedblooddisorders.world.
    Permissions-Policy = "payment=*, publickey-credentials-get=*"
