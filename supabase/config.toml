# Supabase CLI project config.
# Per-function settings are read by `supabase functions deploy` so every
# deploy enforces the intended gateway behaviour on both project refs
# (SCAGO iigbgbgakevcgilucvbs + GANSID gticuvgclbvhwvpzkuez).

# Called from unauthenticated public registration, public sponsor form,
# public exhibitor form, admin manual-ticket tool, admin resend actions,
# and the cheque-received flow. Does its own SMTP credential validation.
[functions.send-ticket-email]
verify_jwt = false

# Called from unauthenticated public registration / sponsor / exhibitor
# forms after a PayPal capture or Flutterwave charge. Does its own
# provider verification + amount/currency validation server-side
# (PayPal order capture, or Flutterwave /transactions/{id}/verify).
[functions.verify-payment]
verify_jwt = false

# Admin-only. Flips a pending cheque sponsor to paid and writes guest
# rows, so it legitimately requires an authenticated admin session.
[functions.confirm-sponsor-cheque]
verify_jwt = true

# Super-admin-only. Creates new auth.users rows + stamps them with
# role='admin' + per-page permissions. Uses service-role inside the
# function body. Gateway must require a JWT so the function can identify
# the caller and enforce the super_admin gate.
[functions.admin-invite]
verify_jwt = true

# Called anonymously by email clients loading the tracking pixel and by
# recipients clicking rewritten CTA links. Uses service-role internally to
# update email_sends open/click columns — never exposes any write path to
# clients. Must be gateway-open.
[functions.track-email]
verify_jwt = false

# Called anonymously from the public ticket-download page (/#/tickets) and
# directly via a GET ?token= link from an email. The HMAC token IS the
# credential — the function verifies it with the service-role key and returns
# only an allow-listed subset of registration data (never SMTP/PayPal secrets).
# Must be gateway-open so the token-bearing link works without a session.
[functions.registration-download]
verify_jwt = false

# Admin-only. Mints a signed free-registration invite token for an imported
# contact and emails the link. Gateway requires a JWT; the function additionally
# asserts the caller is an admin/super_admin before signing anything.
[functions.contact-invite-send]
verify_jwt = true

# Public, token-gated. Resolves an invite token to a contact's name/email for
# prefill, and registers them FREE on completion. The HMAC token is the
# credential; the function trusts NOTHING from the client for the free grant.
[functions.contact-invite-claim]
verify_jwt = false
